<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>لوحة الإدارة - SYRIA TRADING</title>
  <style>
    body{margin:0;background:#090d12;color:#edf1f6;font-family:Arial,"Tahoma",sans-serif}main{max-width:1100px;margin:auto;padding:28px 18px}a{color:#f0c76f}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.card{background:#121821;border:1px solid #2b3442;border-radius:8px;padding:18px}table{width:100%;border-collapse:collapse;margin-top:12px}th,td{padding:10px;border-bottom:1px solid #2b3442;text-align:right}th{color:#f0c76f}.ok{color:#28d79c}.bad{color:#ff5874}.mono{direction:ltr;unicode-bidi:isolate}
  </style>
</head>
<body>
  <main>
    <div class="top"><h1>لوحة الإدارة</h1><a href="/">العودة للموقع</a></div>
    <div class="card">
      <p id="status">جاري تحميل الأعضاء...</p>
      <table id="users" style="display:none">
        <thead><tr><th>الاسم</th><th>البريد</th><th>الدور</th><th>الاشتراك</th><th>الباقة</th><th>ينتهي في</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>
  <script>
    fetch("/api/admin/users").then(async r=>{const d=await r.json();if(!r.ok)throw new Error(d.error);return d}).then(d=>{
      status.textContent=`عدد الأعضاء: ${d.users.length}`;
      users.style.display="table";
      users.querySelector("tbody").innerHTML=d.users.map(u=>`<tr><td>${u.name}</td><td class="mono">${u.email}</td><td>${u.role}</td><td class="${u.subscribed?"ok":"bad"}">${u.subscribed?"فعال":"غير فعال"}</td><td>${u.plan||"-"}</td><td class="mono">${u.subscriptionUntil||"-"}</td></tr>`).join("");
    }).catch(e=>{status.textContent=e.message});
  </script>
</body>
</html>
